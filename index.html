<!DOCTYPE html>
<html>
<head>
  <title>Login Bendahara MWCNU</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{font-family:sans-serif;background:#f5f5f5;display:flex;justify-content:center;align-items:center;height:100vh}
    .box{background:white;padding:30px;border-radius:10px;width:350px;box-shadow:0 0 10px #ccc}
    input{width:100%;padding:10px;margin:10px 0;border:1px solid #ccc;border-radius:5px}
    button{width:100%;padding:12px;background:green;color:white;border:none;border-radius:5px;cursor:pointer;font-size:16px}
    button:hover{background:darkgreen}
    #error{color:red;margin-top:10px}
  </style>
</head>
<body>
  <div class="box">
    <h2 style="text-align:center">MWCNU PRAGAAN</h2>
    <p style="text-align:center">Login Bendahara</p>
    <input id="email" type="email" placeholder="Email" value="bendaharamwcnu@gmail.com">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Masuk</button>
    <p id="error"></p>
  </div>

  <script>
    const supabaseUrl = 'https://bvehkinicqjubmbxbky.supabase.co'
    const supabaseKey = 'sb_publishable_lz-WpLBSUygXb0y4svX-KQ_Wb-38Nb1'
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)

    async function login() {
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value
      const { data, error } = await supabase.auth.signInWithPassword({ email, password })
      if(error) {
        document.getElementById('error').innerText = 'Gagal Login: ' + error.message
      } else {
        window.location.href = 'dashboard.html'
      }
    }
  </script>
</body>
</html>
