..<!DOCTYPE html>
<html>
<head>
  <title>Dashboard Bendahara MWCNU</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{font-family:sans-serif;background:#f5f5f5;padding:20px}
    .header{background:green;color:white;padding:15px;border-radius:10px;text-align:center}
    .card{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px}
    .box{background:white;padding:20px;border-radius:10px;box-shadow:0 2px 5px #ccc;text-align:center}
    .masuk{color:green;font-size:28px;font-weight:bold}
    .keluar{color:red;font-size:28px;font-weight:bold}
  </style>
</head>
<body>
  <div class="header">
    <h2>MWCNU PRAGAAN</h2>
    <p>Dashboard Bendahara</p>
  </div>

  <div class="card">
    <div class="box">
      <h3>Total Arus Masuk</h3>
      <p class="masuk" id="totalMasuk">Loading...</p>
    </div>
    <div class="box">
      <h3>Total Arus Keluar</h3>
      <p class="keluar" id="totalKeluar">Loading...</p>
    </div>
  </div>

  <script>
    const supabaseUrl = 'https://bvehkinicqjubmbxbky.supabase.co'
    const supabaseKey = 'sb_publishable_lz-WpLBSUygXb0y4svX-KQ_Wb-38Nb1'
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)

    async function loadData() {
      // Ambil data dari tabel 'transaksi'
      const { data, error } = await supabase.from('transaksi').select('*')
      
      if(data) {
        let masuk = 0
        let keluar = 0
        data.forEach(item => {
          if(item.jenis == 'masuk') masuk += item.jumlah
          if(item.jenis == 'keluar') keluar += item.jumlah
        })
        document.getElementById('totalMasuk').innerText = 'Rp ' + masuk.toLocaleString('id-ID')
        document.getElementById('totalKeluar').innerText = 'Rp ' + keluar.toLocaleString('id-ID')
      }
    }
    loadData()
  </script>
</body>
</html>
